services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shalukhina-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/shalukhina
      SPRING_DATASOURCE_USERNAME: shalukhina
      SPRING_DATASOURCE_PASSWORD: shalukhina
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080

volumes:
  postgres_data:
